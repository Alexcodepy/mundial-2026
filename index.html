<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundial 2026 · Resultados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero__bg"></div>
    <div class="hero__content">
      <div class="emblem">
        <span class="emblem__trophy">🏆</span>
        <span class="emblem__num">26</span>
      </div>
      <h1 class="hero__title">FIFA WORLD CUP 26<span class="dot">.</span></h1>
      <p class="hero__sub">Canadá · México · Estados Unidos</p>
      <div class="hero__meta">
        <span>11 jun — 19 jul</span>
        <span class="sep">/</span>
        <span>48 selecciones</span>
        <span class="sep">/</span>
        <span>104 partidos</span>
      </div>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <main class="container">
    <section id="matches"></section>
  </main>

  <footer class="footer">
    <p>Datos editables en <code>js/data.js</code> · Estilo basado en la identidad oficial del Mundial 2026 (negro · oro · verde)</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
