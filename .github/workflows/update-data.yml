name: Actualizar resultados

on:
  schedule:
    - cron: "*/15 * * * *"   # cada 15 min
  workflow_dispatch:           # botón manual

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descargar partidos de football-data.org
        env:
          KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: |
          mkdir -p data
          curl -s -H "X-Auth-Token: $KEY" \
            "https://api.football-data.org/v4/competitions/WC/matches" \
            -o data/matches.json
          # Validar que es JSON con partidos; si no, no machacar el archivo
          python3 -c "import json,sys; d=json.load(open('data/matches.json')); sys.exit(0 if d.get('matches') else 1)"

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/matches.json
          git diff --cached --quiet || git commit -m "chore: actualizar resultados [skip ci]"
          git push
